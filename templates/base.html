{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Deep Fake{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'predictor/style.css' %}" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <a class="brand" href="{% url 'home' %}">
          <span class="brand-mark">DF</span>
          <span>Deep Fake</span>
        </a>
        <nav class="nav">
          <a href="{% url 'home' %}" class="{% if request.resolver_match.url_name == 'home' %}active{% endif %}">Home</a>
          <a href="{% url 'image_detector' %}" class="{% if image_active %}active{% endif %}">Image Check</a>
          <a href="{% url 'text_detector' %}" class="{% if text_active %}active{% endif %}">Text Check</a>
        </nav>
      </header>

      <main class="content">
        {% block content %}{% endblock %}
      </main>
    </div>
  </body>
</html>
